# =========================
# App
# =========================
spring.application.name=order-api
server.port=8080
spring.jpa.open-in-view=false

# =========================
# Flyway
# =========================
spring.flyway.enabled=true

# =========================
# Swagger / OpenAPI
# =========================
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api-docs

# =========================
# Logging (default)
# =========================
logging.level.com.dev01.orderflow.orderapi=INFO
app.events.publisher=log
app.sqs.consumer.enabled=false