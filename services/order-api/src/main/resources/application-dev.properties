# =========================
# Database (dev)
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# =========================
# Flyway
# =========================
spring.flyway.enabled=true

# =========================
# AWS / SQS (dev)
# =========================
spring.cloud.aws.region.static=${SPRING_CLOUD_AWS_REGION_STATIC:sa-east-1}
spring.cloud.aws.credentials.profile.name=${SPRING_CLOUD_AWS_CREDENTIALS_PROFILE_NAME:default}

# em DEV ideal e IAM Role/Env vars, mas se for profile:
# spring.cloud.aws.credentials.profile.name=dev

app.events.publisher=${APP_EVENTS_PUBLISHER:sqs}
app.sqs.consumer.enabled=true
app.sqs.order-events-queue=${APP_SQS_ORDER_EVENTS_QUEUE:orderflow-order-events}

# Listener tuning (pode ajustar)
pring.cloud.aws.sqs.listener.max-concurrent-messages=${SQS_MAX_CONCURRENT_MESSAGES:5}
spring.cloud.aws.sqs.listener.max-messages-per-poll=${SQS_MAX_MESSAGES_PER_POLL:5}
spring.cloud.aws.sqs.listener.poll-timeout=${SQS_POLL_TIMEOUT:20s}
spring.cloud.aws.sqs.listener.acknowledgement-mode=ON_SUCCESS

# =========================
# Logging (dev)
# =========================
logging.level.com.dev01.orderflow.orderapi.infra.events=INFO
logging.level.io.awspring.cloud.sqs=INFO
logging.level.io.awspring.cloud.sqs.listener=INFO